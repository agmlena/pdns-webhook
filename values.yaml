# ──────────────────────────────────────────────────────────────────────────────
# external-dns – kubernetes-sigs Helm chart values
# Chart: https://kubernetes-sigs.github.io/external-dns/
#
# Deploy:
#   # 1. PowerDNS API key
#   kubectl create secret generic powerdns-api-key \
#     --from-literal=api-key=<YOUR_PDNS_KEY> \
#     -n external-dns
#
#   # 2. GHCR pull secret (GitHub PAT with read:packages scope – classic PAT)
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io \
#     --docker-username=<GITHUB_USERNAME> \
#     --docker-password=<GITHUB_PAT> \
#     -n external-dns
#
#   # 3. Install chart
#   helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
#   helm repo update
#   helm upgrade --install external-dns external-dns/external-dns \
#     --namespace external-dns --create-namespace \
#     -f values.yaml
# ──────────────────────────────────────────────────────────────────────────────

# ── Image pull secrets ────────────────────────────────────────────────────────
# Applied to the Pod; grants Kubernetes permission to pull from private GHCR.
imagePullSecrets:
  - name: ghcr-pull-secret

# ── Main external-dns image ───────────────────────────────────────────────────
# registry.k8s.io is public – the pull secret above is only needed for the
# webhook sidecar image on GHCR.
image:
  repository: registry.k8s.io/external-dns/external-dns
  tag: v0.20.0
  pullPolicy: IfNotPresent

# ── Provider ──────────────────────────────────────────────────────────────────
provider:
  name: webhook

  webhook:
    image:
      repository: ghcr.io/your-org/external-dns-pdns-webhook-rs   # ← replace
      tag: latest
      pullPolicy: IfNotPresent

    # ── Non-sensitive config ────────────────────────────────────────────────
    env:
      - name: PDNS_API_URL
        value: "http://powerdns.powerdns.svc.cluster.local:8081"
      - name: PDNS_SERVER_ID
        value: "localhost"
      - name: DOMAIN_FILTER
        value: ""              # comma-separated zones, e.g. "example.com,example.net"
      - name: DEFAULT_TTL
        value: "300"
      - name: RUST_LOG
        value: "external_dns_pdns_webhook=info"
      - name: PDNS_API_KEY_FILE
        value: /var/run/secrets/pdns/api-key

    extraVolumeMounts:
      - name: pdns-api-key
        mountPath: /var/run/secrets/pdns
        readOnly: true

    livenessProbe:
      httpGet:
        path: /healthz
        port: http-webhook
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1

    readinessProbe:
      httpGet:
        path: /healthz
        port: http-webhook
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1

    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 64Mi

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop: [ALL]

# ── Sources ───────────────────────────────────────────────────────────────────
# traefik-proxy: watches IngressRoute, IngressRouteTCP, IngressRouteUDP CRDs
#                reads hostnames from Host() rules automatically
# service:       still useful for LoadBalancer services without an IngressRoute
sources:
  - traefik-proxy
  - service

# ── Traefik IngressRoute annotation usage ─────────────────────────────────────
# external-dns reads the Host() rule from IngressRoute specs automatically.
# The only annotation you need on each IngressRoute is:
#
#   external-dns.alpha.kubernetes.io/target: <traefik-lb-hostname-or-ip>
#
# Optionally filter by ingress class so external-dns only manages IngressRoutes
# for a specific Traefik instance (useful when running multiple Traefik instances):
#
#   annotationFilter: "kubernetes.io/ingress.class=traefik-external"
#
annotationFilter:   # leave empty to manage all IngressRoutes

# ── RBAC ──────────────────────────────────────────────────────────────────────
# The chart creates a ClusterRole with standard permissions. Traefik CRD access
# must be added via additionalPermissions since the chart doesn't know about
# Traefik out of the box.
rbac:
  create: true
  additionalPermissions:
    # Required for traefik-proxy source (v0.20.0+: traefik.io only,
    # traefik.containo.us legacy API group was removed)
    - apiGroups: ["traefik.io"]
      resources:
        - ingressroutes
        - ingressroutetcps
        - ingressrouteudps
      verbs: ["get", "watch", "list"]

serviceAccount:
  create: true

# ── Pod-level volumes ─────────────────────────────────────────────────────────
extraVolumes:
  - name: pdns-api-key
    secret:
      secretName: powerdns-api-key
      defaultMode: 0400
      items:
        - key: api-key
          path: api-key

# ── DNS record policy ─────────────────────────────────────────────────────────
policy: sync

# ── TXT registry ──────────────────────────────────────────────────────────────
registry: txt
txtOwnerId: external-dns
txtPrefix: "edns-"

# ── Zone filters ──────────────────────────────────────────────────────────────
domainFilters: []
# domainFilters:
#   - example.com

# ── Record types ──────────────────────────────────────────────────────────────
managedRecordTypes:
  - A
  - AAAA
  - CNAME
  - TXT
  - HTTPS

# ── Logging & sync ────────────────────────────────────────────────────────────
logLevel: info
logFormat: text
interval: 1m
triggerLoopOnEvent: true

# ── Security ──────────────────────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop: [ALL]

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# ── Deployment ────────────────────────────────────────────────────────────────
deploymentStrategy:
  type: Recreate
